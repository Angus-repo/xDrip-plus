name: Android CI

on:
  push:
    branches:
      - main
      - 'release/*'
      - 'feature/*'
  pull_request:
    branches:
      - main
      - 'release/*'
      - 'feature/*'

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    # 檢查出你的原始碼倉庫
    - name: Checkout code
      uses: actions/checkout@v3

    # 設置 Java 環境
    - name: Set up JDK 11
      uses: actions/setup-java@v3
      with:
        java-version: '11'
        distribution: 'zulu'  # 或 'adopt' 取決於你的專案需求

    # 設置 Android SDK
    - name: Set up Android SDK
      uses: android-actions/setup-android@v2
      with:
        api-level: 30
        build-tools-version: '30.0.3'

    # 安裝依賴
    - name: Install dependencies
      run: ./gradlew dependencies

    # 編譯 xDrip+ 應用
    - name: Build with Gradle
      run: ./gradlew assembleRelease

    # 儲存編譯出的 APK 作為 Artifact
    - name: Upload APK
      uses: actions/upload-artifact@v3
      with:
        name: xDrip+-apk
        path: app/build/outputs/apk/release/app-release.apk

    # 自動發布到 GitHub Releases
    - name: Create GitHub Release
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      with:
        tag_name: ${{ github.ref_name }} # 使用分支名稱作為標籤名稱
        release_name: Release for ${{ github.ref_name }}
        body: |
          自動發布來自 ${{ github.ref_name }} 分支的 APK。
        draft: false
        prerelease: true

    # 將 APK 上傳到 Release
    - name: Upload APK to Release
      uses: actions/upload-release-asset@v1
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: app/build/outputs/apk/release/app-release.apk
        asset_name: xDrip+-${{ github.ref_name }}.apk
        asset_content_type: application/vnd.android.package-archive
